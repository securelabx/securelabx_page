<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Claim Request — SecureLabX</title>
<link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

<div id="slx-gate">
  <div class="slx-gate-card">
    <h1>SecureLabX</h1>
    <p class="subtitle">Enter the access password to continue</p>
    <form id="slx-gate-form">
      <input type="password" id="slx-gate-password" placeholder="Password" autocomplete="current-password" required />
      <button type="submit">Unlock</button>
      <p id="slx-gate-error">Incorrect password. Please try again.</p>
    </form>
  </div>
</div>

<div id="slx-content">
  <header class="slx-header">
    <div class="slx-brand">SecureLabX</div>
    <nav class="slx-nav">
      <a href="index.html">Home</a>
      <a href="leave-request.html">Leave Request</a>
      <a href="claim-request.html" class="active">Claim Request</a>
    </nav>
  </header>

  <main class="slx-main">
    <div class="slx-card">
      <h2>Claim Request Form</h2>
      <form class="slx-form" id="slx-data-form">
        <input type="hidden" name="formType" value="Claim Request" />

        <label for="fullName">Full name</label>
        <input type="text" id="fullName" name="Full Name" required />

        <div class="slx-row">
          <div>
            <label for="employeeId">Employee ID</label>
            <input type="text" id="employeeId" name="Employee ID" required />
          </div>
          <div>
            <label for="department">Department</label>
            <input type="text" id="department" name="Department" required />
          </div>
        </div>

        <div class="slx-row">
          <div>
            <label for="claimType">Claim type</label>
            <select id="claimType" name="Claim Type" required>
              <option value="">Select...</option>
              <option>Travel</option>
              <option>Medical</option>
              <option>Meals</option>
              <option>Equipment</option>
              <option>Other</option>
            </select>
          </div>
          <div>
            <label for="claimDate">Date of expense</label>
            <input type="date" id="claimDate" name="Expense Date" required />
          </div>
        </div>

        <label for="amount">Amount</label>
        <input type="number" id="amount" name="Amount" min="0" step="0.01" required />

        <label for="description">Description</label>
        <textarea id="description" name="Description" placeholder="Describe the expense and attach/forward receipts separately to the admin team" required></textarea>

        <button type="submit">Submit</button>
        <div id="slx-form-status" class="form-status"></div>
      </form>
    </div>
  </main>

  <footer class="slx-footer">
    &copy; <span id="slx-year"></span> SecureLabX. Internal use only.
  </footer>
</div>

<script>document.getElementById("slx-year").textContent = new Date().getFullYear();</script>
<script src="assets/js/config.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/form-submit.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Leave Request — SecureLabX</title>
<link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

<div id="slx-gate">
  <div class="slx-gate-card">
    <h1>SecureLabX</h1>
    <p class="subtitle">Enter the access password to continue</p>
    <form id="slx-gate-form">
      <input type="password" id="slx-gate-password" placeholder="Password" autocomplete="current-password" required />
      <button type="submit">Unlock</button>
      <p id="slx-gate-error">Incorrect password. Please try again.</p>
    </form>
  </div>
</div>

<div id="slx-content">
  <header class="slx-header">
    <div class="slx-brand">SecureLabX</div>
    <nav class="slx-nav">
      <a href="index.html">Home</a>
      <a href="leave-request.html" class="active">Leave Request</a>
      <a href="claim_form/claim_form.html">Claim Request</a>
    </nav>
  </header>

  <main class="slx-main">
    <div class="slx-card">
      <h2>Leave Request Form</h2>
      <form class="slx-form" id="slx-data-form">
        <input type="hidden" name="formType" value="Leave Request" />

        <label for="fullName">Full name</label>
        <input type="text" id="fullName" name="Full Name" required />

        <div class="slx-row">
          <div>
            <label for="employeeId">Employee ID</label>
            <input type="text" id="employeeId" name="Employee ID" required />
          </div>
          <div>
            <label for="department">Department</label>
            <input type="text" id="department" name="Department" required />
          </div>
        </div>

        <label for="leaveType">Leave type</label>
        <select id="leaveType" name="Leave Type" required>
          <option value="">Select...</option>
          <option>Annual Leave</option>
          <option>Sick Leave</option>
          <option>Emergency Leave</option>
          <option>Unpaid Leave</option>
          <option>Other</option>
        </select>

        <div class="slx-row">
          <div>
            <label for="startDate">Start date</label>
            <input type="date" id="startDate" name="Start Date" required />
          </div>
          <div>
            <label for="endDate">End date</label>
            <input type="date" id="endDate" name="End Date" required />
          </div>
        </div>

        <label for="reason">Reason</label>
        <textarea id="reason" name="Reason" required></textarea>

        <button type="submit">Submit</button>
        <div id="slx-form-status" class="form-status"></div>
      </form>
    </div>
  </main>

  <footer class="slx-footer">
    &copy; <span id="slx-year"></span> SecureLabX. Internal use only.
  </footer>
</div>

<script>document.getElementById("slx-year").textContent = new Date().getFullYear();</script>
<script src="assets/js/config.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/form-submit.js"></script>
</body>
</html>
